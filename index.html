<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>낱말퍼즐 교실</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Nanum+Pen+Script&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{--navy:#0A1628;--blue:#1A3A6B;--mid:#2356A8;--sky:#4A8FE7;--lite:#A8C8F8;--chalk:#EFF6FF;--white:#FFFFFF;--accent:#FFD166;--green:#16A34A;--red:#EF4444;--border:#C8DCF8;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100vh;background:linear-gradient(135deg,#EBF3FF 0%,#F7FAFF 60%,#DDE9FA 100%);font-family:'Nanum Gothic',sans-serif;color:var(--navy);}
.topnav{background:var(--blue);padding:0 1.5rem;height:54px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 12px rgba(10,22,40,0.2);}
.logo{font-family:'Nanum Pen Script',cursive;font-size:24px;color:var(--white);}
.logo span{color:var(--accent);}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.nav-badge{background:rgba(255,255,255,0.15);color:var(--white);font-size:12px;padding:3px 12px;border-radius:20px;font-weight:700;}
.wrapper{max-width:880px;margin:0 auto;padding:1.75rem 1.25rem 4rem;}
.cb{background:var(--blue);border-radius:16px;padding:1.5rem 2rem;margin-bottom:1.5rem;position:relative;overflow:hidden;box-shadow:0 4px 20px rgba(10,22,40,0.15);}
.cb::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 28px,rgba(255,255,255,0.025) 28px,rgba(255,255,255,0.025) 29px),repeating-linear-gradient(90deg,transparent,transparent 28px,rgba(255,255,255,0.025) 28px,rgba(255,255,255,0.025) 29px);pointer-events:none;}
.cb-title{font-family:'Nanum Pen Script',cursive;font-size:30px;color:var(--white);margin-bottom:4px;position:relative;}
.cb-title span{color:var(--accent);}
.cb-sub{font-size:13px;color:var(--lite);position:relative;}
.chalk-line{height:2px;background:linear-gradient(90deg,rgba(255,255,255,0.5),rgba(255,255,255,0.05));border-radius:2px;margin:12px 0;}
.cb-steps{font-size:13px;color:var(--lite);line-height:2.1;position:relative;}
.card{background:var(--white);border-radius:14px;border:1.5px solid var(--border);padding:1.5rem;margin-bottom:1.25rem;box-shadow:0 2px 12px rgba(74,143,231,0.07);}
.card-title{font-size:11px;font-weight:700;color:var(--mid);letter-spacing:.07em;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.card-title::before{content:'';width:4px;height:16px;background:var(--sky);border-radius:2px;flex-shrink:0;}
input[type=text],input[type=file],select{font-family:'Nanum Gothic',sans-serif;font-size:14px;height:40px;padding:0 12px;border:1.5px solid var(--border);border-radius:9px;background:var(--white);color:var(--navy);outline:none;transition:border-color .2s,box-shadow .2s;}
input[type=text]:focus,select:focus{border-color:var(--sky);box-shadow:0 0 0 3px rgba(74,143,231,0.13);}
input[type=file]{height:auto;padding:7px 10px;}
.btn{font-family:'Nanum Gothic',sans-serif;font-size:13px;font-weight:700;height:40px;padding:0 18px;border-radius:9px;border:none;cursor:pointer;transition:all .15s;white-space:nowrap;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--mid);color:var(--white);}
.btn-primary:hover{background:var(--blue);}
.btn-sky{background:var(--sky);color:var(--white);}
.btn-sky:hover{background:var(--mid);}
.btn-outline{background:transparent;color:var(--mid);border:1.5px solid var(--border);}
.btn-outline:hover{background:var(--chalk);}
.btn-accent{background:var(--accent);color:var(--navy);}
.btn-accent:hover{opacity:.88;}
.btn-green{background:var(--green);color:var(--white);}
.btn-green:hover{background:#15803D;}
.btn-red{background:#FEE2E2;color:#991B1B;border:1.5px solid #FCA5A5;}
.btn-red:hover{background:#FECACA;}
.btn-lg{height:48px;font-size:15px;padding:0 28px;border-radius:11px;width:100%;}
.btn:disabled{opacity:.35;cursor:not-allowed;}
.upload-zone{border:2px dashed var(--border);border-radius:12px;padding:1.25rem;background:var(--chalk);margin-bottom:12px;}
.upload-desc{font-size:12px;color:#4A6FA5;line-height:1.7;margin-bottom:10px;}
.upload-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.upload-result{font-size:12px;margin-top:8px;padding:6px 12px;border-radius:8px;}
.upload-result.ok{background:#DCFCE7;color:#166534;}
.upload-result.err{background:#FEE2E2;color:#991B1B;}
.divider{display:flex;align-items:center;gap:10px;margin:14px 0;font-size:12px;color:#6B8CB8;font-weight:700;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.chip{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;background:var(--chalk);border:1.5px solid var(--border);border-radius:20px;font-size:13px;font-weight:700;color:var(--blue);}
.chip button{background:none;border:none;cursor:pointer;color:#6B8CB8;font-size:13px;padding:0;line-height:1;}
.chip button:hover{color:var(--red);}
.qr-section{display:grid;grid-template-columns:auto 1fr;gap:2rem;align-items:start;}
.qr-box{background:var(--white);border:3px solid var(--mid);border-radius:16px;padding:16px;display:flex;flex-direction:column;align-items:center;gap:10px;min-width:180px;}
.qr-box #qrcode canvas,.qr-box #qrcode img{width:148px!important;height:148px!important;}
.qr-label{font-size:11px;font-weight:700;color:var(--mid);letter-spacing:.04em;text-align:center;}
.stu-table{width:100%;border-collapse:collapse;font-size:13px;}
.stu-table th{background:var(--chalk);padding:9px 12px;text-align:left;font-weight:700;color:var(--mid);border-bottom:2px solid var(--border);font-size:11px;letter-spacing:.04em;text-transform:uppercase;}
.stu-table td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
.stu-table tr:last-child td{border-bottom:none;}
.stu-table tr:hover td{background:var(--chalk);}
.pill{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:700;}
.pill-done{background:#DCFCE7;color:#166534;}
.pill-partial{background:#DBEAFE;color:#1E40AF;}
.pill-none{background:#FEF9C3;color:#854D0E;}
.progress-bar{height:8px;background:#DBEAFE;border-radius:4px;overflow:hidden;margin:8px 0;}
.progress-fill{height:100%;background:var(--mid);border-radius:4px;transition:width .4s;}
.stu-header{background:linear-gradient(135deg,var(--blue),var(--mid));border-radius:16px;padding:1.5rem 2rem;margin-bottom:1.5rem;color:var(--white);text-align:center;}
.stu-header h2{font-family:'Nanum Pen Script',cursive;font-size:32px;margin-bottom:4px;}
.stu-header .sh-sub{font-size:13px;color:var(--lite);}
.stu-header .sh-name{font-size:18px;font-weight:700;color:var(--accent);margin-top:8px;}
.name-select-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;max-height:400px;overflow-y:auto;}
.name-btn{width:100%;padding:14px 18px;background:var(--chalk);border:2px solid var(--border);border-radius:12px;font-family:'Nanum Gothic',sans-serif;font-size:15px;font-weight:700;color:var(--navy);cursor:pointer;transition:all .15s;text-align:left;display:flex;align-items:center;justify-content:space-between;}
.name-btn:hover{border-color:var(--sky);background:#EBF3FF;}
.name-btn.submitted{border-color:#86EFAC;background:#F0FDF4;color:#166534;}
.word-slots{display:flex;flex-direction:column;gap:14px;margin-bottom:1.25rem;}
.ws{background:var(--white);border:2px solid var(--border);border-radius:13px;padding:16px 18px;transition:border-color .2s;}
.ws.filled{border-color:var(--sky);background:#F8FBFF;}
.ws-top{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.ws-num{width:30px;height:30px;border-radius:50%;background:var(--mid);color:var(--white);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ws-title{font-size:14px;font-weight:700;color:var(--navy);flex:1;}
.ws-check{color:var(--green);font-size:16px;}
.ws-row{display:grid;grid-template-columns:140px 1fr auto;gap:8px;align-items:center;}
.err{font-size:12px;color:var(--red);min-height:16px;margin-top:4px;}
.big-header{background:linear-gradient(135deg,#0A1628,#1A3A6B);border-radius:16px;padding:1.5rem 2rem;margin-bottom:1.5rem;color:var(--white);}
.big-header h2{font-family:'Nanum Pen Script',cursive;font-size:30px;margin-bottom:4px;}
.big-header p{font-size:13px;color:var(--lite);}
.solve-layout{display:grid;grid-template-columns:1fr 220px;gap:1.5rem;}
#crossword-grid{display:inline-grid;border:2px solid var(--mid);border-radius:10px;overflow:hidden;margin-bottom:12px;box-shadow:0 4px 20px rgba(35,86,168,0.14);}
.cell{width:38px;height:38px;position:relative;display:flex;align-items:center;justify-content:center;}
.cell.black{background:var(--blue);}
.cell.white{background:var(--white);border:1px solid #C8DCF8;cursor:pointer;transition:background .1s;}
.cell.white:hover{background:var(--chalk);}
.cell.white.sel{background:#DBEAFE;}
.cell.white.hi{background:#EBF3FF;}
.cell.white.ok{background:#DCFCE7;}
.cell.white.ng{background:#FEE2E2;}
.cell input{position:absolute;inset:0;width:100%;height:100%;border:none;background:transparent;text-align:center;font-size:16px;font-weight:700;color:var(--navy);outline:none;cursor:pointer;caret-color:transparent;font-family:'Nanum Gothic',sans-serif;}
.cnum{position:absolute;top:2px;left:3px;font-size:7.5px;font-weight:700;color:var(--sky);line-height:1;pointer-events:none;z-index:1;}
.clue-box{background:var(--white);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:10px;max-height:380px;overflow-y:auto;}
.clue-sec-title{font-size:11px;font-weight:700;color:var(--mid);letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border);}
.ci{padding:5px 7px;border-radius:6px;cursor:pointer;display:flex;gap:6px;line-height:1.5;font-size:12px;transition:background .1s;}
.ci:hover{background:var(--chalk);}
.ci.active{background:#DBEAFE;color:var(--mid);}
.cn{font-weight:700;min-width:20px;color:var(--sky);}
.action-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;}
.score-b{display:inline-block;padding:4px 12px;border-radius:8px;font-size:13px;font-weight:700;}
.score-b.g{background:#DCFCE7;color:#166534;}
.score-b.o{background:#FEF9C3;color:#854D0E;}
.score-b.r{background:#FEE2E2;color:#991B1B;}
.info-tip{background:var(--chalk);border-left:4px solid var(--sky);border-radius:0 10px 10px 0;padding:12px 16px;font-size:13px;color:#1E40AF;line-height:1.7;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(10,22,40,0.55);z-index:300;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:var(--white);border-radius:16px;padding:2rem;max-width:420px;width:92%;box-shadow:0 8px 40px rgba(10,22,40,0.25);}
.modal h3{font-size:18px;font-weight:700;color:var(--navy);margin-bottom:6px;}
.modal-sub{font-size:13px;color:#4A6FA5;margin-bottom:16px;}
.mw-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--chalk);border-radius:8px;font-size:13px;margin-bottom:6px;}
.mw-word{font-weight:700;min-width:80px;}
.mw-clue{color:#4A6FA5;flex:1;}
@media(max-width:600px){.qr-section{grid-template-columns:1fr;}.solve-layout{grid-template-columns:1fr;}.ws-row{grid-template-columns:1fr 1fr;}.ws-row button{grid-column:span 2;}}
</style>
</head>
<body>
<nav class="topnav">
  <div class="logo">📖 낱말퍼즐 <span>교실</span></div>
  <div class="nav-right">
    <div id="nav-info" class="nav-badge" style="display:none;"></div>
    <button id="nav-teacher-btn" class="btn btn-outline" style="display:none;font-size:12px;color:rgba(255,255,255,0.85);border-color:rgba(255,255,255,0.25);" onclick="goTeacher()">🏫 선생님 화면</button>
  </div>
</nav>
<div class="wrapper" id="root"></div>

<div class="modal-bg" id="preview-modal" onclick="if(event.target===this)closePreview()">
  <div class="modal">
    <h3 id="pm-title"></h3>
    <p class="modal-sub" id="pm-sub"></p>
    <div id="pm-words"></div>
    <div style="text-align:right;margin-top:12px;">
      <button class="btn btn-outline" onclick="closePreview()">닫기</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
const STORE='xword_v6';
let S={classTitle:'우리반 낱말퍼즐',students:{},consolidated:null};
function save(){try{localStorage.setItem(STORE,JSON.stringify(S));}catch(e){}}
function load(){try{const d=JSON.parse(localStorage.getItem(STORE)||'null');if(d&&d.students)S=d;}catch(e){}}

// ── 전역 학생 세션 (학생 화면용) ──
// QR 스캔 후 학생 화면에서 사용하는 임시 상태
let SESSION={classTitle:'',students:[],currentName:''};

// ═══════════════════════════════════════
// URL 인코딩/디코딩
// ═══════════════════════════════════════
function enc(obj){return btoa(unescape(encodeURIComponent(JSON.stringify(obj))));}
function dec(h){try{return JSON.parse(decodeURIComponent(escape(atob(h))));}catch(e){return null;}}
function makeUrl(obj){return location.origin+location.pathname+'#'+enc(obj);}

// ═══════════════════════════════════════
// ROUTER
// ═══════════════════════════════════════
function route(){
  load();
  const hash=location.hash.slice(1);
  if(hash){
    const d=dec(hash);
    if(d){
      if(d.type==='class'){
        // QR 스캔으로 들어온 학생
        SESSION.classTitle=d.classTitle||'낱말퍼즐 교실';
        SESSION.students=d.students||[];
        renderNameSelect();
        return;
      }
      if(d.type==='submit'){
        importSubmission(d);
        return;
      }
      if(d.type==='puzzle'){
        renderPuzzleFromData(d.layout,d.classTitle);
        return;
      }
    }
  }
  if(Object.keys(S.students).length>0) renderTeacher();
  else renderSetup();
}
window.addEventListener('popstate',route);
function goTeacher(){history.pushState(null,'',location.pathname);load();renderTeacher();}

// ═══════════════════════════════════════
// 선생님 화면 1: 설정
// ═══════════════════════════════════════
function renderSetup(){
  setNav('선생님','none');
  document.getElementById('root').innerHTML=`
    <div class="cb">
      <div class="cb-title">한국어 낱말퍼즐 <span>교실</span></div>
      <div class="cb-sub">학생이 직접 단어를 입력하고, 모아서 큰 십자말풀이를 만들어요</div>
      <div class="chalk-line"></div>
      <div class="cb-steps">① 학생 명단 입력 → ② QR코드 화면 공유 → ③ 학생이 이름 선택 후 단어 입력 → ④ 선생님이 취합 &amp; 퍼즐 생성</div>
    </div>
    <div class="card">
      <div class="card-title">수업 제목</div>
      <input type="text" id="class-title" placeholder="예: 3학년 2반 봄 낱말퍼즐" value="${S.classTitle}" style="width:100%;max-width:420px;"/>
    </div>
    <div class="card">
      <div class="card-title">학생 명단 입력</div>
      <div class="upload-zone">
        <div class="upload-desc"><strong>지원 형식:</strong> .xlsx, .xls, .csv &nbsp;|&nbsp; 첫 번째 열에 학생 이름</div>
        <div class="upload-row">
          <input type="file" id="xl-file" accept=".xlsx,.xls,.csv"/>
          <button class="btn btn-sky" onclick="loadExcel()">📂 불러오기</button>
        </div>
        <div id="xl-result"></div>
      </div>
      <div class="divider">또는 직접 입력</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
        <input type="text" id="stu-inp" placeholder="학생 이름" style="width:150px;" onkeydown="if(event.key==='Enter')addStu()"/>
        <button class="btn btn-primary" onclick="addStu()">+ 추가</button>
        <span id="stu-cnt" style="font-size:12px;color:#4A6FA5;"></span>
      </div>
      <div class="chips" id="stu-chips"></div>
      <div id="setup-next" style="display:none;margin-top:18px;">
        <button class="btn btn-accent btn-lg" onclick="finishSetup()">▶ 명단 확정 &amp; QR코드 생성</button>
      </div>
    </div>`;
  refreshSetupUI();
}

function addStu(){
  const inp=document.getElementById('stu-inp');
  const n=inp.value.trim();if(!n)return;
  if(!S.students[n])S.students[n]={words:[],submitted:false};
  inp.value='';save();refreshSetupUI();
}
function removeStu(n){delete S.students[n];save();refreshSetupUI();}
function refreshSetupUI(){
  const names=Object.keys(S.students);
  const chips=document.getElementById('stu-chips');
  const cnt=document.getElementById('stu-cnt');
  const nxt=document.getElementById('setup-next');
  if(!chips)return;
  cnt.textContent=names.length?`총 ${names.length}명`:'';
  nxt.style.display=names.length?'block':'none';
  chips.innerHTML=names.map(n=>`<div class="chip"><span>${n}</span><button onclick="removeStu('${escJs(n)}')">✕</button></div>`).join('');
}

function loadExcel(){
  const file=document.getElementById('xl-file').files[0];
  if(!file){showXlResult('파일을 선택해주세요.','err');return;}
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      let names=[];
      if(file.name.endsWith('.csv')){
        e.target.result.split(/\r?\n/).filter(l=>l.trim()).forEach((line,i)=>{
          const v=line.split(',')[0].trim().replace(/^"|"$/g,'');
          if(!v)return;
          if(i===0&&['이름','name','학생','학생이름'].includes(v.toLowerCase()))return;
          names.push(v);
        });
      }else{
        const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
        XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1}).forEach((row,i)=>{
          const v=row[0]!=null?String(row[0]).trim():'';if(!v)return;
          if(i===0&&['이름','name','학생','학생이름'].includes(v.toLowerCase()))return;
          names.push(v);
        });
      }
      names=names.filter(n=>n.length>0);
      if(!names.length){showXlResult('이름을 찾을 수 없어요.','err');return;}
      names.forEach(n=>{if(!S.students[n])S.students[n]={words:[],submitted:false};});
      showXlResult(`✓ ${names.length}명 불러오기 완료!`,'ok');
      save();refreshSetupUI();
    }catch(err){showXlResult('파일 오류: '+err.message,'err');}
  };
  if(file.name.endsWith('.csv'))reader.readAsText(file,'UTF-8');
  else reader.readAsArrayBuffer(file);
}
function showXlResult(msg,type){const el=document.getElementById('xl-result');if(el){el.className='upload-result '+type;el.textContent=msg;}}

function finishSetup(){
  const t=document.getElementById('class-title');
  if(t)S.classTitle=t.value.trim()||'우리반 낱말퍼즐';
  save();renderTeacher();
}

// ═══════════════════════════════════════
// 선생님 화면 2: 관리
// ═══════════════════════════════════════
function renderTeacher(){
  load();setNav('선생님 화면','none');
  const names=Object.keys(S.students);
  const submitted=names.filter(n=>S.students[n].submitted).length;
  const pct=names.length?Math.round(submitted/names.length*100):0;
  const anyWords=names.some(n=>S.students[n].words.length>0);

  const rows=names.map(n=>{
    const s=S.students[n];
    const wc=s.words.filter(w=>w.word).length;
    const pill=s.submitted
      ?`<span class="pill pill-done">✓ 제출 (${wc}단어)</span>`
      :(wc>0?`<span class="pill pill-partial">${wc}개 입력중</span>`:`<span class="pill pill-none">미입력</span>`);
    const words=s.words.filter(w=>w.word).map(w=>`<strong>${w.word}</strong>`).join(', ')||'—';
    return `<tr>

function renderWordSlots(draft,draftKey,name,classTitle){
  const s=draft[name];
  const slotsEl=document.getElementById('word-slots');
  const submitEl=document.getElementById('submit-area');
  if(!slotsEl)return;

  slotsEl.innerHTML='';
  s.words.slice(0,3).forEach((w,i)=>{
    const div=document.createElement('div');
    div.className='ws'+(w.word?' filled':'');
    div.innerHTML=`
      <div class="ws-top">
        <div class="ws-num">${i+1}</div>
        <div class="ws-title">단어 ${i+1}</div>
        ${w.word?'<span class="ws-check">✓</span>':''}
      </div>
      <div class="ws-row">
        <input type="text" placeholder="단어 (예: 봄바람)" value="${escHtml(w.word||'')}"/>
        <input type="text" placeholder="힌트 (예: 봄에 부는 바람)" value="${escHtml(w.clue||'')}"/>
        <button class="btn btn-sky save-btn">저장</button>
      </div>
      <div class="err" id="err-${i}"></div>`;
    slotsEl.appendChild(div);

    // ★ addEventListener 방식으로 저장 버튼 연결
    div.querySelector('.save-btn').addEventListener('click',()=>{
      const inputs=div.querySelectorAll('input');
      const word=inputs[0].value.trim();
      const clue=inputs[1].value.trim();
      const errEl=document.getElementById('err-'+i);
      if(!word){errEl.textContent='단어를 입력해주세요.';return;}
      if([...word].length<2){errEl.textContent='단어는 2글자 이상이어야 합니다.';return;}
      if(!clue){errEl.textContent='힌트를 입력해주세요.';return;}
      errEl.textContent='';
      let d={};try{d=JSON.parse(localStorage.getItem(draftKey)||'{}');}catch(e){}
      if(!d[name])d[name]={words:[{word:'',clue:''},{word:'',clue:''},{word:'',clue:''}],submitted:false};
      d[name].words[i]={word,clue};
      localStorage.setItem(draftKey,JSON.stringify(d));
      draft[name].words[i]={word,clue};
      renderWordSlots(draft,draftKey,name,classTitle);
    });
  });

  // 제출 버튼
  const allFilled=s.words.slice(0,3).every(w=>w.word&&w.clue);
  if(s.submitted){
    submitEl.innerHTML=`
      <div style="background:#DCFCE7;border-radius:12px;padding:16px 18px;font-size:14px;font-weight:700;color:#166534;text-align:center;margin-bottom:12px;">
        ✅ 제출 완료! 선생님께 아래 링크를 보내주세요.
      </div>`;
    const copyBtn=document.createElement('button');
    copyBtn.className='btn btn-sky btn-lg';
    copyBtn.textContent='📤 제출 링크 복사해서 선생님께 전달';
    copyBtn.addEventListener('click',()=>{
      let d={};try{d=JSON.parse(localStorage.getItem(draftKey)||'{}');}catch(e){}
      const words=(d[name]&&d[name].words)||[];
      const url=makeUrl({type:'submit',name,words});
      navigator.clipboard.writeText(url)
        .then(()=>alert('📤 링크가 복사되었어요!\n카카오톡 등으로 선생님께 보내주세요.'))
        .catch(()=>prompt('이 링크를 선생님께 보내주세요:',url));
    });
    submitEl.appendChild(copyBtn);
  }else{
    const errDiv=document.createElement('div');
    errDiv.className='err';errDiv.style.marginBottom='8px';errDiv.style.fontSize='13px';
    const subBtn=document.createElement('button');
    subBtn.className='btn btn-accent btn-lg';
    subBtn.disabled=!allFilled;
    subBtn.textContent=allFilled?'📨 제출하기':'단어 3개를 모두 저장해주세요';
    subBtn.addEventListener('click',()=>{
      let d={};try{d=JSON.parse(localStorage.getItem(draftKey)||'{}');}catch(e){}
      if(!d[name])return;
      const words=d[name].words.slice(0,3);
      if(!words.every(w=>w.word&&[...w.word].length>=2&&w.clue)){errDiv.textContent='단어와 힌트를 모두 저장해주세요.';return;}
      d[name].submitted=true;
      localStorage.setItem(draftKey,JSON.stringify(d));
      draft[name].submitted=true;
      renderWordSlots(draft,draftKey,name,classTitle);
    });
    submitEl.appendChild(errDiv);
    submitEl.appendChild(subBtn);
  }

  // 뒤로가기
  const backBtn=document.createElement('button');
  backBtn.className='btn btn-outline';backBtn.style.marginTop='12px';backBtn.style.width='100%';
  backBtn.textContent='← 이름 선택으로 돌아가기';
  backBtn.addEventListener('click',()=>renderNameSelect());
  submitEl.appendChild(backBtn);
}

function consolidate(){
  load();
  const all=[];
  for(const[n,s]of Object.entries(S.students)){
    for(const w of s.words){
      if(w.word&&w.clue&&[...w.word].length>=2)
        all.push({word:w.word,clue:`[${n}] ${w.clue}`});
    }
  }
  if(all.length<2){alert('단어가 부족해요. 학생들이 먼저 단어를 입력해야 합니다.');return;}
  const seen=new Set();
  const unique=all.filter(w=>{if(seen.has(w.word))return false;seen.add(w.word);return true;});
  const sorted=unique.sort((a,b)=>[...b.word].length-[...a.word].length);
  let best=null;
  for(let a=0;a<120;a++){
    const r=tryPlace(sorted);
    if(r&&(!best||r.placed.length>best.placed.length)){best=r;if(best.placed.length===sorted.length)break;}
  }
  if(!best){alert('퍼즐 배치 실패. 다시 시도해주세요.');return;}
  S.consolidated=best;save();renderTeacher();
}

// ═══════════════════════════════════════
// 십자말풀이 엔진
// ═══════════════════════════════════════
function gc(w){return[...w];}

function tryPlace(sorted){
  const OFF=25;const pos=[];
  pos.push({word:sorted[0].word,clue:sorted[0].clue,row:OFF,col:OFF,dir:'across'});
  for(let wi=1;wi<sorted.length;wi++){
    const w=sorted[wi];const wc=gc(w.word);const cands=[];
    for(const pw of pos){
      const pwc=gc(pw.word);
      for(let pi=0;pi<pwc.length;pi++)for(let wi2=0;wi2<wc.length;wi2++){
        if(pwc[pi]===wc[wi2]){
          const nd=pw.dir==='across'?'down':'across';
          let r,c;
          if(nd==='down'){r=pw.row-wi2;c=pw.col+pi;}else{r=pw.row+pi;c=pw.col-wi2;}
          cands.push({word:w.word,clue:w.clue,row:r,col:c,dir:nd});
        }
      }
    }
    for(let i=cands.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[cands[i],cands[j]]=[cands[j],cands[i]];}
    let placed=false;
    for(const cand of cands){if(canPlace(pos,cand)){pos.push(cand);placed=true;break;}}
    if(!placed){const ind=findInd(pos,w);if(ind)pos.push(ind);}
  }
  if(!pos.length)return null;
  let minR=Infinity,minC=Infinity;
  for(const p of pos){minR=Math.min(minR,p.row);minC=Math.min(minC,p.col);}
  const norm=pos.map(p=>({...p,row:p.row-minR+1,col:p.col-minC+1}));
  let maxR=0,maxC=0;
  for(const p of norm){const len=gc(p.word).length;if(p.dir==='across'){maxR=Math.max(maxR,p.row);maxC=Math.max(maxC,p.col+len-1);}else{maxR=Math.max(maxR,p.row+len-1);maxC=Math.max(maxC,p.col);}}
  return{placed:norm,rows:maxR+2,cols:maxC+2};
}

function findInd(existing,w){
  const occ=buildOcc(existing);
  let minR=Infinity,minC=Infinity,maxR=0,maxC=0;
  for(const k of Object.keys(occ)){const[r,c]=k.split(',').map(Number);minR=Math.min(minR,r);minC=Math.min(minC,c);maxR=Math.max(maxR,r);maxC=Math.max(maxC,c);}
  const tries=[
    {word:w.word,clue:w.clue,row:minR,col:maxC+3,dir:'across'},
    {word:w.word,clue:w.clue,row:maxR+3,col:minC,dir:'down'},
    {word:w.word,clue:w.clue,row:minR,col:maxC+3,dir:'down'},
    {word:w.word,clue:w.clue,row:maxR+3,col:minC,dir:'across'},
  ];
  for(const t of tries){if(canPlace(existing,t))return t;}
  return null;
}

function buildOcc(existing){
  const occ={};
  for(const p of existing){const pc=gc(p.word);for(let i=0;i<pc.length;i++){const r=p.dir==='across'?p.row:p.row+i,c=p.dir==='across'?p.col+i:p.col;occ[r+','+c]={letter:pc[i],dir:p.dir};}}
  return occ;
}

function canPlace(existing,cand){
  const occ=buildOcc(existing);const wc=gc(cand.word);
  for(let i=0;i<wc.length;i++){
    const r=cand.dir==='across'?cand.row:cand.row+i,c=cand.dir==='across'?cand.col+i:cand.col;const k=r+','+c;
    if(occ[k]){if(occ[k].letter!==wc[i]||occ[k].dir===cand.dir)return false;}
    if(occ[(cand.dir==='across'?r-1:r)+','+(cand.dir==='across'?c:c-1)]&&!occ[k])return false;
    if(occ[(cand.dir==='across'?r+1:r)+','+(cand.dir==='across'?c:c+1)]&&!occ[k])return false;
  }
  const bR=cand.dir==='across'?cand.row:cand.row-1,bC=cand.dir==='across'?cand.col-1:cand.col;
  const aR=cand.dir==='across'?cand.row:cand.row+wc.length,aC=cand.dir==='across'?cand.col+wc.length:cand.col;
  if(occ[bR+','+bC]||occ[aR+','+aC])return false;
  return true;
}

function buildGrid(layout){
  GS={rows:layout.rows,cols:layout.cols};
  G=Array.from({length:layout.rows},()=>Array.from({length:layout.cols},()=>({black:true,answer:'',number:null,wordIds:[]})));
  layout.placed.forEach((p,wi)=>{const pc=gc(p.word);for(let i=0;i<pc.length;i++){const r=p.dir==='across'?p.row:p.row+i,c=p.dir==='across'?p.col+i:p.col;G[r][c].black=false;G[r][c].answer=pc[i];G[r][c].wordIds.push(wi);}});
  let num=1;
  for(let r=0;r<GS.rows;r++)for(let c=0;c<GS.cols;c++){if(G[r][c].black)continue;const sA=(c===0||G[r][c-1].black)&&c+1<GS.cols&&!G[r][c+1].black;const sD=(r===0||G[r-1][c].black)&&r+1<GS.rows&&!G[r+1][c].black;if(sA||sD){G[r][c].number=num;layout.placed.forEach(p=>{if(p.row===r&&p.col===c)p.number=num;});num++;}}
}

function renderGridDom(){
  const cont=document.getElementById('crossword-grid');
  cont.style.gridTemplateColumns=`repeat(${GS.cols},38px)`;
  cont.style.gridTemplateRows=`repeat(${GS.rows},38px)`;
  cont.innerHTML='';
  for(let r=0;r<GS.rows;r++)for(let c=0;c<GS.cols;c++){
    const cell=G[r][c];const div=document.createElement('div');
    div.className='cell '+(cell.black?'black':'white');div.dataset.r=r;div.dataset.c=c;
    if(!cell.black){
      if(cell.number){const sp=document.createElement('span');sp.className='cnum';sp.textContent=cell.number;div.appendChild(sp);}
      const inp=document.createElement('input');inp.type='text';inp.maxLength=2;
      inp.addEventListener('mousedown',e=>{e.preventDefault();if(SC&&SC[0]===r&&SC[1]===c)SD=SD==='across'?'down':'across';SC=[r,c];selCell(r,c);inp.focus();});
      inp.addEventListener('keydown',e=>hkey(e,r,c));
      inp.addEventListener('input',e=>{const ch=gc(e.target.value);if(ch.length){e.target.value=ch[ch.length-1];mnext(r,c);}else e.target.value='';});
      div.appendChild(inp);
    }
    cont.appendChild(div);
  }
  renderClues();
  if(PW.length)selCell(PW[0].row,PW[0].col);
}

function selCell(r,c){
  if(r<0||r>=GS.rows||c<0||c>=GS.cols||G[r][c].black)return;
  SC=[r,c];const wids=G[r][c].wordIds;let found=null;
  for(const wi of wids){if(PW[wi].dir===SD){found=wi;break;}}
  if(found===null&&wids.length){found=wids[0];SD=PW[found].dir;}
  AW=found;hilite();clueHL();
  const inp=document.querySelector(`.cell[data-r="${r}"][data-c="${c}"] input`);if(inp)inp.focus();
}
function hilite(){
  document.querySelectorAll('.cell.white').forEach(el=>el.classList.remove('sel','hi'));
  if(SC){const el=document.querySelector(`.cell[data-r="${SC[0]}"][data-c="${SC[1]}"]`);if(el)el.classList.add('sel');}
  if(AW!==null){const p=PW[AW];const len=gc(p.word).length;for(let i=0;i<len;i++){const r=p.dir==='across'?p.row:p.row+i,c=p.dir==='across'?p.col+i:p.col;const el=document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);if(el&&!(SC&&SC[0]===r&&SC[1]===c))el.classList.add('hi');}}
}
function hkey(e,r,c){
  if(e.key==='Backspace'){if(e.target.value)e.target.value='';else mprev(r,c);e.preventDefault();return;}
  const m={ArrowRight:()=>SD==='across'?mnext(r,c):(SD='across',selCell(r,c)),ArrowLeft:()=>SD==='across'?mprev(r,c):(SD='across',selCell(r,c)),ArrowDown:()=>SD==='down'?mnext(r,c):(SD='down',selCell(r,c)),ArrowUp:()=>SD==='down'?mprev(r,c):(SD='down',selCell(r,c))};
  if(m[e.key]){m[e.key]();e.preventDefault();}
  if(e.key==='Tab'){e.preventDefault();nword(e.shiftKey);}
}
function mnext(r,c){if(SD==='across'&&c+1<GS.cols&&!G[r][c+1].black)selCell(r,c+1);else if(SD==='down'&&r+1<GS.rows&&!G[r+1][c].black)selCell(r+1,c);}
function mprev(r,c){if(SD==='across'&&c-1>=0&&!G[r][c-1].black)selCell(r,c-1);else if(SD==='down'&&r-1>=0&&!G[r-1][c].black)selCell(r-1,c);}
function nword(rev){
  const num=PW.filter(p=>p.number).sort((a,b)=>a.number!==b.number?a.number-b.number:['across','down'].indexOf(a.dir)-['across','down'].indexOf(b.dir));
  const cur=AW!==null?num.findIndex(p=>p===PW[AW]):-1;
  const nxt=rev?(cur-1+num.length)%num.length:(cur+1)%num.length;
  const pw=num[nxt];SD=pw.dir;AW=PW.indexOf(pw);SC=[pw.row,pw.col];hilite();clueHL();
  const inp=document.querySelector(`.cell[data-r="${pw.row}"][data-c="${pw.col}"] input`);if(inp)inp.focus();
}
function clueHL(){
  document.querySelectorAll('.ci').forEach(el=>el.classList.remove('active'));
  if(AW!==null){const el=document.querySelector(`.ci[data-wi="${AW}"]`);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}}
}
function renderClues(){
  const ac=document.getElementById('clues-across'),dn=document.getElementById('clues-down');
  ac.innerHTML='';dn.innerHTML='';
  PW.filter(p=>p.number).sort((a,b)=>a.number-b.number).forEach(pw=>{
    const wi=PW.indexOf(pw);const div=document.createElement('div');div.className='ci';div.dataset.wi=wi;
    div.innerHTML=`<span class="cn">${pw.number}</span><span>${pw.clue}</span>`;
    div.addEventListener('click',()=>{SD=pw.dir;AW=wi;SC=[pw.row,pw.col];hilite();clueHL();const inp=document.querySelector(`.cell[data-r="${pw.row}"][data-c="${pw.col}"] input`);if(inp)inp.focus();});
    (pw.dir==='across'?ac:dn).appendChild(div);
  });
}
function checkAns(){
  let ok=0,total=0;
  for(let r=0;r<GS.rows;r++)for(let c=0;c<GS.cols;c++){
    if(G[r][c].black)continue;total++;
    const inp=document.querySelector(`.cell[data-r="${r}"][data-c="${c}"] input`);
    const cel=document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
    if(!inp)continue;cel.classList.remove('ok','ng');
    if(inp.value){if(inp.value===G[r][c].answer){ok++;cel.classList.add('ok');}else cel.classList.add('ng');}
  }
  const pct=total?Math.round(ok/total*100):0;
  const cls=pct>=80?'g':pct>=50?'o':'r';
  document.getElementById('score-display').innerHTML=`<span class="score-b ${cls}">${ok}/${total}칸 정답 (${pct}%)</span>`;
}
function revealSel(){
  if(AW===null)return;
  const pw=PW[AW];const pc=gc(pw.word);
  for(let i=0;i<pc.length;i++){const r=pw.dir==='across'?pw.row:pw.row+i,c=pw.dir==='across'?pw.col+i:pw.col;const inp=document.querySelector(`.cell[data-r="${r}"][data-c="${c}"] input`);if(inp)inp.value=pc[i];}
}
function clearAll(){
  document.querySelectorAll('#crossword-grid input').forEach(i=>i.value='');
  document.querySelectorAll('.cell.white').forEach(el=>el.classList.remove('ok','ng'));
  document.getElementById('score-display').innerHTML='';
}

function setNav(label,teacherBtn){
  document.getElementById('nav-info').style.display='inline-block';
  document.getElementById('nav-info').textContent=label;
  document.getElementById('nav-teacher-btn').style.display=teacherBtn;
}
// JS 문자열 인라인 삽입 시 이스케이프 (onclick 속성용)
function escJs(s){return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"');}
// HTML 속성 이스케이프
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

window.addEventListener('load',route);
